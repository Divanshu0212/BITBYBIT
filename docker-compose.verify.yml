version: "3.9"

# ─────────────────────────────────────────────────────────────────────
# Code Verification Infrastructure
# Start with:  docker compose -f docker-compose.verify.yml up -d
# ─────────────────────────────────────────────────────────────────────

services:
  # ── SonarQube Community (Layer 3: Quality Gate) ────────────────────
  sonarqube:
    image: sonarqube:community
    container_name: bitbybit-sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/api/system/status | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
